services:
  - type: web
    name: bloom-node-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
        generateValue: true
      - key: FRONTEND_URL
        value: https://bloom--plant-disease-detector.vercel.app
    healthCheckPath: /
